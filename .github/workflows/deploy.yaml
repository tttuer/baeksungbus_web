name: Deploy frontend to k3s

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NAMESPACE: baeksungbus
  WEB_IMAGE: tttuer/baeksungbus-web
  REMOTE_K8S_DIR: /tmp/baeksungbus-web-k8s-${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate .env.production file
        run: |
          echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" >> .env.production
          echo "VITE_KAKAO_MAP_API_KEY=${{ secrets.VITE_KAKAO_MAP_API_KEY }}" >> .env.production

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
            ${{ env.WEB_IMAGE }}:latest

      - name: Upload Kubernetes manifests to k3s server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: k8s/*
          target: ${{ env.REMOTE_K8S_DIR }}
          strip_components: 1

      - name: Apply manifests on k3s
        uses: appleboy/ssh-action@v1.2.0
        env:
          WEB_DEPLOY_IMAGE: ${{ env.WEB_IMAGE }}:${{ github.sha }}
          REMOTE_K8S_DIR: ${{ env.REMOTE_K8S_DIR }}
          NAMESPACE: ${{ env.NAMESPACE }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: WEB_DEPLOY_IMAGE,REMOTE_K8S_DIR,NAMESPACE,DOCKER_USERNAME,DOCKER_PASSWORD
          script: |
            set -eu

            echo "Applying namespace..."
            kubectl apply -f "$REMOTE_K8S_DIR/namespace.yaml"

            echo "Applying Docker Hub pull secret..."
            kubectl create secret docker-registry dockerhub-registry \
              --namespace "$NAMESPACE" \
              --docker-server=https://index.docker.io/v1/ \
              --docker-username="$DOCKER_USERNAME" \
              --docker-password="$DOCKER_PASSWORD" \
              --dry-run=client -o yaml | kubectl apply -f -

            echo "Setting deployment image..."
            sed -i "s|ghcr.io/your-org/baeksungbus-web:latest|$WEB_DEPLOY_IMAGE|g" "$REMOTE_K8S_DIR/deploy.yaml"

            echo "Applying manifests..."
            kubectl apply -f "$REMOTE_K8S_DIR/deploy.yaml"
            kubectl apply -f "$REMOTE_K8S_DIR/ingress.yaml"

            echo "Waiting for rollout..."
            kubectl rollout status deployment/baeksungbus-web -n "$NAMESPACE" --timeout=180s

            rm -rf "$REMOTE_K8S_DIR"
            echo "Deploy complete."
